<button id="testButton" onclick="testFn()">Test Function</button>

<pre id="output" style="
  margin-top: 12px;
  padding: 10px;
  background: #111;
  color: #0f0;
  max-width: 600px;
  white-space: pre-wrap;
  font-family: monospace;
">
Waiting for test…
</pre>

<script>
async function testFn() {
  const output = document.getElementById("output");
  output.textContent = "Calling Netlify function…";

  try {
    const res = await fetch("/.netlify/functions/create-checkout", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        amount: 5,
        description: "Test Payment"
      })
    });

    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      throw new Error("Response was not JSON:\n" + text);
    }

    if (!res.ok) {
      throw new Error(
        "Server error (" + res.status + "):\n" +
        JSON.stringify(data, null, 2)
      );
    }

    output.textContent =
      "✅ Function responded successfully:\n\n" +
      JSON.stringify(data, null, 2);

    // If Stripe returns a checkout URL, you can optionally redirect
    if (data.url) {
      output.textContent += "\n\nStripe Checkout URL received.";
      // Uncomment next line once you're ready to test redirect:
      // window.location.href = data.url;
    }

  } catch (err) {
    output.textContent =
      "❌ Error calling function:\n\n" +
      err.message;
  }
}
</script>
